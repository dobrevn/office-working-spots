<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Seat Booking</title>
    <!-- Tailwind CSS за модерен дизайн -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome за иконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Хедър -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">
                    <i class="fa-solid fa-building text-indigo-500 mr-2"></i>Резервация на места в офиса
                </h1>
                <p class="text-slate-400 mt-1">Изберете конкретна календарна дата за резервация</p>
            </div>
            
            <!-- Избор на дата (Твърд календар) -->
            <div class="mt-4 md:mt-0 flex flex-col gap-1 bg-slate-800 p-3 rounded-xl border border-slate-700">
                <div class="flex items-center gap-3">
                    <label for="date-picker" class="font-medium text-slate-300">Избрана дата:</label>
                    <input type="date" id="date-picker" class="bg-slate-950 text-white border border-slate-600 rounded-lg p-2 focus:outline-none focus:border-indigo-500">
                </div>
                <div id="date-info" class="text-xs text-center font-semibold text-indigo-400 mt-1"></div>
            </div>
        </header>

        <!-- Съобщение за неработен ден -->
        <div id="weekend-warning" class="hidden mb-6 bg-amber-500/10 border border-amber-500/40 text-amber-400 p-4 rounded-xl text-center font-medium">
            <i class="fa-solid fa-triangle-exclamation mr-2"></i>Избраната дата е почивен или празничен ден. Резервациите са затворени.
        </div>

        <!-- Легенда -->
        <div class="flex gap-6 mb-8 bg-slate-800/50 p-4 rounded-xl border border-slate-800 text-sm justify-center">
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 bg-emerald-500 rounded"></div> <span>Свободно</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 bg-rose-500 rounded"></div> <span>Заето</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 bg-indigo-600 rounded"></div> <span>Твоето място</span>
            </div>
        </div>

        <!-- Табове за стаите -->
        <div class="flex gap-4 mb-6 border-b border-slate-800">
            <button id="tab-main" class="px-6 py-3 font-semibold text-indigo-400 border-b-2 border-indigo-500 transition-all">
                <i class="fa-solid fa-door-open mr-2"></i>Основна стая (22 монитора)
            </button>
            <button id="tab-small" class="px-6 py-3 font-semibold text-slate-400 hover:text-slate-200 transition-all">
                <i class="fa-solid fa-door-closed mr-2"></i>Малка стая (3 монитора)
            </button>
        </div>

        <!-- Основна стая Схема -->
        <div id="room-main-container" class="block">
            <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-6 md:p-8">
                <h3 class="text-lg font-medium text-slate-400 mb-6"><i class="fa-solid fa-compass mr-2"></i>План на Основната стая</h3>
                
                <div class="flex flex-col md:flex-row gap-8 justify-center items-center md:items-start overflow-x-auto">
                    <!-- Ляв край (4 монитора) -->
                    <div class="bg-slate-950/40 p-4 rounded-xl border border-slate-800/60 text-center">
                        <div class="text-xs font-semibold text-slate-500 mb-3 uppercase tracking-wider">Ляв край</div>
                        <div id="left-block" class="grid grid-cols-2 gap-3"></div>
                    </div>

                    <!-- Работна зона (Острови) -->
                    <div class="bg-slate-950/40 p-4 rounded-xl border border-slate-800/60 text-center flex-1 min-w-[300px]">
                        <div class="text-xs font-semibold text-slate-500 mb-3 uppercase tracking-wider">Работна зона (Острови)</div>
                        <div id="rows-block" class="grid grid-cols-3 gap-x-6 gap-y-8 justify-center"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Малка стая Схема -->
        <div id="room-small-container" class="hidden">
            <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-6 md:p-8 text-center">
                <h3 class="text-lg font-medium text-slate-400 mb-6 text-left"><i class="fa-solid fa-compass mr-2"></i>План на Малката стая</h3>
                <div class="bg-slate-950/40 p-6 rounded-xl border border-slate-800/60 inline-block mx-auto">
                    <div id="small-room-block" class="grid grid-cols-3 gap-4"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модален прозорец за Резервация -->
    <div id="booking-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden justify-center items-center z-50">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-2" id="modal-title">Резервация</h3>
            <p class="text-slate-400 text-sm mb-4" id="modal-subtitle"></p>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-300 mb-1">Вашето име:</label>
                <input type="text" id="user-name" placeholder="Въведете име..." class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <div class="flex gap-3 justify-end mt-6">
                <button id="btn-close-modal" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-xl text-sm font-medium">Отказ</button>
                <button id="btn-confirm-booking" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-medium shadow-lg shadow-indigo-600/20">Запази място</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

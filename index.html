<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Live Map</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome за икони -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 min-h-screen text-slate-100 font-sans p-4 md:p-8 selection:bg-indigo-500/30">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- ЛЯВА КОЛОНА: КАЛЕНДАР И СРЕЩИ -->
        <div class="lg:col-span-4 flex flex-col gap-6">
            <!-- Календар -->
            <div class="bg-slate-900/40 backdrop-blur-md border border-slate-800 p-5 rounded-2xl shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <button id="btn-prev-month" class="text-slate-400 hover:text-indigo-400 transition cursor-pointer p-1"><i class="fa-solid fa-chevron-left"></i></button>
                    <h3 id="calendar-month-year" class="text-sm font-bold tracking-wide uppercase text-slate-200"></h3>
                    <button id="btn-next-month" class="text-slate-400 hover:text-indigo-400 transition cursor-pointer p-1"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">
                    <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Нд</div>
                </div>
                <div id="calendar-days-grid" class="grid grid-cols-7 gap-1"></div>
                <input type="date" id="date-picker" class="hidden">
            </div>

            <!-- Срещи в конферентната -->
            <div class="bg-slate-900/40 backdrop-blur-md border border-slate-800 p-5 rounded-2xl shadow-xl flex-1 flex flex-col">
                <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-handshake text-indigo-400"></i> Конферентна зала
                </h3>
                <div id="meeting-slots-container" class="space-y-3 overflow-y-auto max-h-[400px] pr-1"></div>
            </div>
        </div>

        <!-- ДЯСНА КОЛОНА: ОФИС КАРТА -->
        <div class="lg:col-span-8 flex flex-col gap-4">
            <!-- Табове за стаите -->
            <div class="flex bg-slate-950/60 p-1.5 rounded-xl border border-slate-800 max-w-xs shadow-inner">
                <button id="tab-main" class="flex-1 text-center py-2.5 rounded-lg font-bold text-sm bg-indigo-600 text-white shadow-lg cursor-pointer transition-all">Голяма стая</button>
                <button id="tab-small" class="flex-1 text-center py-2.5 rounded-lg font-bold text-sm text-slate-400 hover:text-slate-200 cursor-pointer transition-all">Малка стая</button>
            </div>

            <!-- Главна контейнерна кутия за Офиса -->
            <div class="bg-slate-900/20 backdrop-blur-lg border border-slate-800/60 p-6 rounded-3xl shadow-2xl relative min-h-[620px] flex flex-col justify-between">
                
                <div class="mb-4">
                    <span id="current-selected-date-display" class="text-lg font-black tracking-tight text-indigo-400"></span>
                </div>

                <!-- ГОЛЯМА СТАЯ -->
                <div id="room-main-container" class="block flex-1 relative min-h-[500px]">
                    
                    <!-- МАСА А (ВЕРТИКАЛНА И ПЕРПЕНДИКУЛЯРНА) -->
                    <div class="absolute left-6 top-16 bg-slate-800/20 border border-slate-700/30 p-4 rounded-2xl flex flex-col items-center gap-4 shadow-lg backdrop-blur-sm">
                        <div class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1">Ляв Край</div>
                        
                        <!-- Бюра 3 и 4 (Горна двойка, едно срещу друго) -->
                        <div class="flex gap-4 items-center">
                            <div id="pos-M-3"></div>
                            <div class="w-1 bg-slate-700/40 h-12 rounded"></div> <!-- Разделителна линия -->
                            <div id="pos-M-4"></div>
                        </div>

                        <!-- Физическият блок "МАСА А" завъртян перпендикулярно -->
                        <div class="w-full bg-amber-900/80 border border-amber-700 text-amber-200 font-mono text-[10px] font-black tracking-widest text-center py-1.5 rounded-md shadow-inner uppercase">
                            Маса А
                        </div>

                        <!-- Бюра 1 и 2 (Долна двойка, едно срещу друго) -->
                        <div class="flex gap-4 items-center">
                            <div id="pos-M-1"></div>
                            <div class="w-1 bg-slate-700/40 h-12 rounded"></div> <!-- Разделителна линия -->
                            <div id="pos-M-2"></div>
                        </div>
                    </div>

                    <!-- ОСТАНАЛИТЕ МАСИ (ДЕСЕН КРАЙ) -->
                    <div class="absolute right-6 top-6 bottom-6 left-56 grid grid-cols-2 gap-6">
                        <!-- Маса 1 -->
                        <div class="bg-slate-800/10 border border-slate-800/40 rounded-2xl p-3 flex justify-between items-center gap-2">
                            <div id="t1-left" class="flex flex-col gap-2"></div>
                            <div class="h-full w-4 bg-amber-900/60 border border-amber-800 rounded flex items-center justify-center text-[9px] font-bold font-mono text-amber-300 uppercase [writing-mode:vertical-lr] tracking-widest select-none shadow-inner">Маса 1</div>
                            <div id="t1-right" class="flex flex-col gap-2"></div>
                        </div>
                        <!-- Маса 2 -->
                        <div class="bg-slate-800/10 border border-slate-800/40 rounded-2xl p-3 flex justify-between items-center gap-2">
                            <div id="t2-left" class="flex flex-col gap-2"></div>
                            <div class="h-full w-4 bg-amber-900/60 border border-amber-800 rounded flex items-center justify-center text-[9px] font-bold font-mono text-amber-300 uppercase [writing-mode:vertical-lr] tracking-widest select-none shadow-inner">Маса 2</div>
                            <div id="t2-right" class="flex flex-col gap-2"></div>
                        </div>
                        <!-- Маса 3 -->
                        <div class="bg-slate-800/10 border border-slate-800/40 rounded-2xl p-3 flex justify-between items-center gap-2 col-span-2 max-w-md mx-auto w-full">
                            <div id="t3-left" class="flex flex-col gap-2"></div>
                            <div class="h-full w-4 bg-amber-900/60 border border-amber-800 rounded flex items-center justify-center text-[9px] font-bold font-mono text-amber-300 uppercase [writing-mode:vertical-lr] tracking-widest select-none shadow-inner">Маса 3</div>
                            <div id="t3-right" class="flex flex-col gap-2"></div>
                        </div>
                    </div>

                </div>

                <!-- МАЛКА СТАЯ -->
                <div id="room-small-container" class="hidden flex-1 relative min-h-[500px]">
                    <div class="absolute inset-0 flex items-center justify-center text-slate-500 font-medium">
                        <p class="text-sm border border-dashed border-slate-800 p-8 rounded-xl"><i class="fa-solid fa-compass-drafting mr-2"></i>Тук можете да добавите конфигурация за малката стая</p>
                    </div>
                </div>

                <!-- ЛИНИЯТА НА СТЕНАТА И ВХОДНИТЕ ВРАТИ (НАЙ-ДОЛУ) -->
                <div class="w-full border-t border-slate-800/80 mt-4 pt-4 flex justify-around relative">
                    <!-- Входна врата 1 -->
                    <div class="bg-slate-900 px-4 py-1.5 border-t-2 border-emerald-500 text-emerald-400 text-[10px] font-black tracking-widest uppercase rounded-b shadow-md">
                        <i class="fa-solid fa-door-open mr-1.5 animate-pulse"></i> Вход Главна
                    </div>
                    <!-- Входна врата 2 -->
                    <div class="bg-slate-900 px-4 py-1.5 border-t-2 border-emerald-500 text-emerald-400 text-[10px] font-black tracking-widest uppercase rounded-b shadow-md">
                        <i class="fa-solid fa-door-open mr-1.5 animate-pulse"></i> Вход Коридор
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- МОДАЛЕН ПРОЗОРЕЦ: БЮРА -->
    <div id="booking-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="text-base font-bold text-slate-100 flex items-center gap-2"><i class="fa-solid fa-circle-check text-indigo-400"></i>Запазване на място</h3>
            <p id="modal-subtitle" class="text-xs text-slate-400 mt-1"></p>
            <div class="mt-4">
                <label class="block text-[11px] uppercase font-bold tracking-wider text-slate-400 mb-1.5">Вашето Име:</label>
                <input type="text" id="user-name" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 shadow-inner" placeholder="напр. Иван П.">
            </div>
            <div class="mt-5 flex gap-3">
                <button id="btn-close-modal" class="flex-1 py-2 bg-slate-800 text-slate-300 rounded-xl text-xs font-bold hover:bg-slate-700 cursor-pointer transition">Отказ</button>
                <button id="btn-confirm-booking" class="flex-1 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold hover:bg-indigo-500 shadow-lg shadow-indigo-600/20 cursor-pointer transition">Потвърди</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЕН ПРОЗОРЕЦ: СРЕЩИ -->
    <div id="meeting-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="text-base font-bold text-slate-100 flex items-center gap-2"><i class="fa-solid fa-calendar-plus text-indigo-400"></i>Резервация на зала</h3>
            <p id="meeting-modal-subtitle" class="text-xs text-slate-400 mt-1"></p>
            <div class="mt-4 space-y-3">
                <div>
                    <label class="block text-[11px] uppercase font-bold tracking-wider text-slate-400 mb-1">Тема на срещата:</label>
                    <input type="text" id="meeting-title" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 shadow-inner" placeholder="напр. Среща с клиенти">
                </div>
                <div>
                    <label class="block text-[11px] uppercase font-bold tracking-wider text-slate-400 mb-1">Кой ще присъства:</label>
                    <input type="text" id="meeting-attendees" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 shadow-inner" placeholder="напр. Иван, Мария, Георги">
                </div>
            </div>
            <div class="mt-5 flex gap-3">
                <button id="btn-close-meeting-modal" class="flex-1 py-2 bg-slate-800 text-slate-300 rounded-xl text-xs font-bold hover:bg-slate-700 cursor-pointer transition">Отказ</button>
                <button id="btn-confirm-meeting" class="flex-1 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold hover:bg-indigo-500 shadow-lg shadow-indigo-600/20 cursor-pointer transition">Запази зала</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
